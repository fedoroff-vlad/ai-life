name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # GIB diffs against the base branch, so the build needs full git history.
          fetch-depth: 0

      - name: set up jdk 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # Skip the (heavy) Maven build for docs-only changes — *.md / docs/ / plans/.
      # The job still reports green so the "build & test" check is satisfied.
      - name: detect docs-only change
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags origin "${{ github.base_ref }}"
            changed=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD")
          else
            changed=$(git diff --name-only HEAD~1 HEAD)
          fi
          echo "changed files:"; echo "$changed"
          code=$(echo "$changed" | grep -vE '(\.md$|^docs/|^plans/)' || true)
          if [ -n "$changed" ] && [ -z "$code" ]; then
            echo "docs-only change — skipping the Maven build"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: enable testcontainers reuse
        if: steps.detect.outputs.skip != 'true'
        run: echo "testcontainers.reuse.enable=true" >> ~/.testcontainers.properties

      # Native OCR engine for mcp-media-processing's real-OCR test (Tess4J in-image,
      # MP-b). Without it that test self-skips; installing it here proves the real path.
      - name: install tesseract (OCR)
        if: steps.detect.outputs.skip != 'true'
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends tesseract-ocr tesseract-ocr-eng tesseract-ocr-rus

      # PR: incremental build via GIB (only modules changed vs the base + their
      # dependents). Push to main: full verify (GIB stays disabled via .mvn/maven.config)
      # — main remains the authoritative full-suite run.
      # PR only: pre-install the test-helper libs + their full upstream (-am) into the local
      # .m2 so the incremental GIB verify can resolve *test*-scope dependencies of any reactor
      # module. GIB computes its reactor over compile/runtime edges, so a test-scope dep is
      # never pulled in: a PR touching contracts drags e.g. event-bus in as a dependent and
      # Maven fails resolving event-bus's test-scope `test-support`; likewise an agent's
      # `golden-test-support` (and its own compile chain agent-runtime -> doc-render). Installing
      # both helper libs with -am puts them and everything they need in .m2, so every such
      # resolution succeeds. Cheap + robust, and it doesn't run their tests (-DskipTests). This
      # is only needed on PRs that don't also add a module (a module add edits the root pom ->
      # GIB builds all anyway).
      - name: pre-install test-helper libs (PR incremental resolution)
        if: steps.detect.outputs.skip != 'true' && github.event_name == 'pull_request'
        run: mvn -B -ntp -q -DskipTests -pl libs/test-support,libs/golden-test-support -am install

      # PR: incremental build via GIB (only modules changed vs the base + their
      # dependents). Push to main: full verify (GIB stays disabled via .mvn/maven.config)
      # — main remains the authoritative full-suite run.
      - name: maven verify
        if: steps.detect.outputs.skip != 'true'
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # buildUpstream=always pulls the changed modules' upstream libs into the same
            # reactor, so their compile-scope SNAPSHOTs resolve intra-build. Test-scope deps of
            # reactor modules resolve from .m2 (the pre-install step above).
            # argsForUpstreamModules=maven.test.skip=true builds upstream libs main-only (jar for
            # downstream to compile against), skipping their test compile+run — an upstream lib is
            # a dependency here, not the thing under test; its own tests run on main and on any PR
            # that actually changes it (then it's in the changed set, not upstream).
            mvn -B -ntp \
              -Dgib.disable=false \
              -Dgib.referenceBranch="refs/remotes/origin/${{ github.base_ref }}" \
              -Dgib.fetchReferenceBranch=true \
              -Dgib.buildUpstream=always \
              -Dgib.argsForUpstreamModules='maven.test.skip=true' \
              verify
          else
            mvn -B -ntp verify
          fi
