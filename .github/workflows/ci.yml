name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # GIB diffs against the base branch, so the build needs full git history.
          fetch-depth: 0

      # Change-propagation drift-lint (CLAUDE.md §Change-propagation map). Fast, no Java —
      # runs unconditionally, incl. docs-only PRs, so coupled artifacts can't drift apart.
      - name: consistency drift-lint
        run: bash scripts/check-consistency.sh

      - name: set up jdk 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      # Skip the (heavy) Maven build for docs-only changes — *.md / docs/ / plans/.
      # The job still reports green so the "build & test" check is satisfied.
      - name: detect docs-only change
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags origin "${{ github.base_ref }}"
            changed=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD")
          else
            changed=$(git diff --name-only HEAD~1 HEAD)
          fi
          echo "changed files:"; echo "$changed"
          code=$(echo "$changed" | grep -vE '(\.md$|^docs/|^plans/)' || true)
          if [ -n "$changed" ] && [ -z "$code" ]; then
            echo "docs-only change — skipping the Maven build"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # NOTE: Testcontainers reuse is deliberately NOT enabled. Both the main full build and the PR
      # incremental build run with `-T2` (module parallelism) — reuse + parallel modules would share
      # one container and corrupt each other's schema, so parallelism needs an isolated container per
      # module (the default). Measured trade: `-T` ≈2x win >> reuse's ~4%. (`-T2` is safe on the PR
      # path because the pre-install-libs step below seeds every lib SNAPSHOT into .m2 — see there.)
      # See CLAUDE.md §Test strategy + plans/migration-25-boot4.md §Build/CI performance.

      # Native OCR engine for mcp-media-processing's real-OCR test (Tess4J in-image,
      # MP-b). Without it that test self-skips; installing it here proves the real path.
      - name: install tesseract (OCR)
        if: steps.detect.outputs.skip != 'true'
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends tesseract-ocr tesseract-ocr-eng tesseract-ocr-rus

      # PR only: pre-install the WHOLE `libs/*` layer into the local .m2 before the GIB verify.
      # Two reasons, both about resolution against a GIB-pruned reactor under `-T2`:
      #   1. Test-scope deps: GIB computes its reactor over compile/runtime edges, so a *test*-scope
      #      dep is never pulled in — a PR touching contracts drags e.g. event-bus in as a dependent
      #      and Maven fails resolving event-bus's test-scope `test-support`/`golden-test-support`.
      #   2. Parallel (`-T2`) upstream SNAPSHOT races: with a pruned reactor, a downstream module may
      #      resolve a compile-scope lib SNAPSHOT (e.g. profile-service -> platform-common) before/
      #      without that lib being in the reactor thread that built it. A copy in .m2 is the fallback
      #      that makes resolution order-independent, so `-T2` is safe on the PR path too.
      # The whole lib layer builds in seconds (no Testcontainers, -DskipTests). Internal compile-scope
      # SNAPSHOTs only ever point at `libs/*` (agents reach MCP/services over HTTP, not as deps), so
      # installing all libs covers every case. Not needed when a PR also adds a module (edits the root
      # pom -> GIB builds all anyway), but harmless then.
      - name: pre-install libs to .m2 (PR incremental + parallel resolution)
        if: steps.detect.outputs.skip != 'true' && github.event_name == 'pull_request'
        run: >
          mvn -B -ntp -q -DskipTests install
          -pl libs/contracts,libs/llm-client,libs/mcp-client,libs/event-bus,libs/platform-common,libs/agent-runtime,libs/doc-render,libs/test-support,libs/golden-test-support

      # PR: incremental build via GIB (only modules changed vs the base + their
      # dependents). Push to main: full verify (GIB stays disabled via .mvn/maven.config)
      # — main remains the authoritative full-suite run.
      - name: maven verify
        if: steps.detect.outputs.skip != 'true'
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # buildUpstream=always pulls the changed modules' upstream libs into the same
            # reactor, so their compile-scope SNAPSHOTs resolve intra-build. Test-scope deps of
            # reactor modules resolve from .m2 (the pre-install step above).
            # argsForUpstreamModules=maven.test.skip=true builds upstream libs main-only (jar for
            # downstream to compile against), skipping their test compile+run — an upstream lib is
            # a dependency here, not the thing under test; its own tests run on main and on any PR
            # that actually changes it (then it's in the changed set, not upstream).
            # -T2 parallelises the pruned reactor; the pre-install-libs step above puts every
            # compile-scope lib SNAPSHOT in .m2 so parallel threads never race on upstream resolution.
            mvn -B -ntp -T2 \
              -Dgib.disable=false \
              -Dgib.referenceBranch="refs/remotes/origin/${{ github.base_ref }}" \
              -Dgib.fetchReferenceBranch=true \
              -Dgib.buildUpstream=always \
              -Dgib.argsForUpstreamModules='maven.test.skip=true' \
              verify
          else
            mvn -B -ntp -T2 verify
          fi
