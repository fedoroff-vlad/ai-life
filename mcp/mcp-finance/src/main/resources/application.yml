spring:
  application:
    name: mcp-finance
  datasource:
    url: ${MCP_FINANCE_DB_URL:jdbc:postgresql://localhost:5432/ailife}
    username: ${MCP_FINANCE_DB_USER:ailife}
    password: ${MCP_FINANCE_DB_PASSWORD:ailife}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate.jdbc.time_zone: UTC

  ai:
    mcp:
      server:
        name: ai-life-finance
        version: 0.0.1
        type: ASYNC
        instructions: >
          Source-of-truth finance CRUD over Postgres finance.* schema.
          Accounts, categories and transactions for personal/household
          budgeting. Amounts use the sign convention: expense<0, income>0.

server:
  port: ${MCP_FINANCE_PORT:8092}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

logging:
  level:
    root: INFO
    dev.fedorov.ailife: DEBUG
