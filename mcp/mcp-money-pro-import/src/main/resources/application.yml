spring:
  application:
    name: mcp-money-pro-import
  datasource:
    url: ${MCP_MONEY_PRO_IMPORT_DB_URL:jdbc:postgresql://localhost:5432/ailife}
    username: ${MCP_MONEY_PRO_IMPORT_DB_USER:ailife}
    password: ${MCP_MONEY_PRO_IMPORT_DB_PASSWORD:ailife}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate.jdbc.time_zone: UTC

  ai:
    mcp:
      server:
        name: ai-life-money-pro-import
        version: 0.0.1
        type: ASYNC
        instructions: >
          One-time history import of Money Pro (iOS/macOS) CSV exports into the
          finance.fin_transaction table. Idempotent on re-import via
          (household, source='moneypro_import', external_ref). Supports a dry-run
          preview that reports counts without writing rows. Encoding/delimiter
          are autodetected; sign convention is expense<0, income>0.

server:
  port: ${MCP_MONEY_PRO_IMPORT_PORT:8094}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

logging:
  level:
    root: INFO
    dev.fedorov.ailife: DEBUG
