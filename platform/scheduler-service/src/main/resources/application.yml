spring:
  application:
    name: scheduler-service
  datasource:
    url: ${SCHEDULER_DB_URL:jdbc:postgresql://localhost:5432/ailife}
    username: ${SCHEDULER_DB_USER:ailife}
    password: ${SCHEDULER_DB_PASSWORD:ailife}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate.jdbc.time_zone: UTC
  main:
    web-application-type: servlet

server:
  port: ${SCHEDULER_PORT:8085}

scheduler:
  orchestrator-base-url: ${ORCHESTRATOR_URL:http://orchestrator:8083}
  tick-millis: ${SCHEDULER_TICK_MILLIS:30000}
  batch-size: ${SCHEDULER_BATCH_SIZE:50}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

logging:
  level:
    root: INFO
    dev.fedorov.ailife: DEBUG
    org.hibernate.SQL: WARN
