spring:
  application:
    name: orchestrator

server:
  port: ${ORCHESTRATOR_PORT:8083}

ailife:
  llm-client:
    base-url: ${LLM_GATEWAY_URL:http://llm-gateway:8081}

orchestrator:
  # Catch-all for actionable messages matching no specialized domain → GTD inbox.
  # Self-disables to echo if the named agent isn't registered.
  catch-all-agent: ${ORCHESTRATOR_CATCH_ALL_AGENT:tasks}
  agents:
    - name: calendar
      base-url: ${CALENDAR_AGENT_URL:http://calendar-agent:8086}
    - name: finance
      base-url: ${FINANCE_AGENT_URL:http://finance-agent:8093}
    - name: tasks
      base-url: ${TASKS_AGENT_URL:http://tasks-agent:8096}
    - name: researcher
      base-url: ${RESEARCHER_AGENT_URL:http://researcher-agent:8099}
    - name: stylist
      base-url: ${STYLIST_AGENT_URL:http://stylist-agent:8102}
    - name: nutritionist
      base-url: ${NUTRITIONIST_AGENT_URL:http://nutritionist-agent:8105}
    - name: chef
      base-url: ${CHEF_AGENT_URL:http://chef-agent:8106}
    - name: creator
      base-url: ${CREATOR_AGENT_URL:http://creator-agent:8109}
    - name: briefing
      base-url: ${BRIEFING_AGENT_URL:http://briefing-agent:8115}
    - name: docs
      base-url: ${DOCS_AGENT_URL:http://docs-agent:8117}
    - name: notes
      base-url: ${NOTES_AGENT_URL:http://notes-agent:8118}
    - name: coordinator
      base-url: ${COORDINATOR_AGENT_URL:http://coordinator-agent:8119}
  conversation:
    enabled: ${ORCHESTRATOR_CONVERSATION_ENABLED:true}
    url: ${CONVERSATION_SERVICE_URL:http://conversation-service:8089}
  memory:
    enabled: ${ORCHESTRATOR_MEMORY_ENABLED:true}
    url: ${MEMORY_SERVICE_URL:http://memory-service:8087}
    recall-k: ${ORCHESTRATOR_MEMORY_RECALL_K:3}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

logging:
  level:
    root: INFO
    dev.fedorov.ailife: DEBUG
