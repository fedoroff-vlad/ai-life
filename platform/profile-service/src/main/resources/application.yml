spring:
  application:
    name: profile-service
  datasource:
    url: ${PROFILE_DB_URL:jdbc:postgresql://localhost:5432/ailife}
    username: ${PROFILE_DB_USER:ailife}
    password: ${PROFILE_DB_PASSWORD:ailife}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate.jdbc.time_zone: UTC
      hibernate.type.json_format_mapper: dev.fedorov.ailife.common.jackson.Jackson3JsonFormatMapper
server:
  port: ${PROFILE_SERVICE_PORT:8082}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

logging:
  level:
    root: INFO
    dev.fedorov.ailife: DEBUG
    org.hibernate.SQL: WARN
