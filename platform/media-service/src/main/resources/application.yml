spring:
  application:
    name: media-service
  datasource:
    url: ${MEDIA_DB_URL:jdbc:postgresql://localhost:5432/ailife}
    username: ${MEDIA_DB_USER:ailife}
    password: ${MEDIA_DB_PASSWORD:ailife}
  servlet:
    multipart:
      # Above the media.max-bytes cap (10 MiB) so the service-level check is the
      # one that rejects oversized uploads with a clean 400, not the servlet container.
      max-file-size: 16MB
      max-request-size: 16MB

server:
  port: ${MEDIA_PORT:8088}

media:
  max-bytes: ${MEDIA_MAX_BYTES:10485760}
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ROOT_USER:ailife}
    secret-key: ${MINIO_ROOT_PASSWORD:ailife-secret}
    bucket: ${MEDIA_BUCKET:ai-life-media}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

logging:
  level:
    root: INFO
    dev.fedorov.ailife: DEBUG
