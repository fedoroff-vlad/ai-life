spring:
  application:
    name: conversation-service
  datasource:
    url: ${CONVERSATION_DB_URL:jdbc:postgresql://localhost:5432/ailife}
    username: ${CONVERSATION_DB_USER:ailife}
    password: ${CONVERSATION_DB_PASSWORD:ailife}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate.jdbc.time_zone: UTC
      hibernate.type.json_format_mapper: dev.fedorov.ailife.common.jackson.Jackson3JsonFormatMapper
server:
  port: ${CONVERSATION_PORT:8089}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

logging:
  level:
    root: INFO
    dev.fedorov.ailife: DEBUG
