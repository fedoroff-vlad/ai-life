spring:
  application:
    name: notifier-service
  datasource:
    url: ${NOTIFIER_DB_URL:jdbc:postgresql://localhost:5432/ailife}
    username: ${NOTIFIER_DB_USER:ailife}
    password: ${NOTIFIER_DB_PASSWORD:ailife}

server:
  port: ${NOTIFIER_PORT:8084}

notifier:
  profile-base-url: ${PROFILE_SERVICE_URL:http://profile-service:8082}
  gateway-base-url: ${GATEWAY_TELEGRAM_URL:http://gateway-telegram:8080}
  internal-api-token: ${INTERNAL_API_TOKEN:}

# Consumer: notifier listens for notify.requested events on the bus and delivers them.
event-bus:
  channel: ${EVENT_BUS_CHANNEL:ailife_events}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

logging:
  level:
    root: INFO
    dev.fedorov.ailife: DEBUG
