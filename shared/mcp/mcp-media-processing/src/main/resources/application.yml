spring:
  application:
    name: mcp-media-processing

  ai:
    mcp:
      server:
        name: ai-life-media-processing
        version: 0.0.1
        type: ASYNC
        instructions: >
          Shared media-understanding capability. Pass a media-service object id;
          the server fetches the bytes and returns text. ocr: recognise text in an
          image (local engine). caption: ask an LLM vision model about an image
          given an instruction. transcribe: speech-to-text on an audio/video clip
          (local engine).

server:
  port: ${MCP_MEDIA_PROCESSING_PORT:8097}

# llm-gateway client for the caption (vision) tool.
ailife:
  llm-client:
    base-url: ${LLM_GATEWAY_URL:http://llm-gateway:8081}

mediaprocessing:
  media-service-url: ${MEDIA_SERVICE_URL:http://media-service:8088}
  # OCR engine: tesseract (real, native lib in image) | stub (native-free marker).
  ocr-engine: ${MCP_MEDIA_PROCESSING_OCR_ENGINE:tesseract}
  tess-lang: ${MCP_MEDIA_PROCESSING_TESS_LANG:rus+eng}
  # STT engine: whisper (real, calls the ASR sidecar over HTTP) | stub (native-free marker).
  stt-engine: ${MCP_MEDIA_PROCESSING_STT_ENGINE:whisper}
  whisper-url: ${WHISPER_ASR_URL:http://whisper:9000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

logging:
  level:
    root: INFO
    dev.fedorov.ailife: DEBUG
