# ai-life change-map — drop this at the repo root as .skills/change-map.yaml
# Derived from ai-life/CLAUDE.md "Change-propagation map". Keep in sync when a
# new mechanically-checkable coupling appears (this replaces the hand checklist).
version: 1
couplings:
  - id: llm-model-tag
    trigger: Changed the LLM model / tag
    ssot: infra/.env.mac.example
    must_update:
      - infra/.env.example
      - scripts/golden.sh
      - platform/llm-gateway/README.md
      - plans/lifecycle.md
      - plans/architecture.md
    revalidate:
      - golden lane
    notes: >
      Retiring a tag → add it to RETIRED_TAGS in scripts/check-consistency.sh.
      plans/architecture.md holds the model list in §LLM strategy + the host size in
      its header blockquote — both must track the SSOT (drift caught 2026-07-16).

  - id: embedding-model-dimension
    trigger: Changed the embedding model or its vector dimension
    ssot: infra/.env.mac.example
    must_update:
      - infra/.env.example                                        # MEMORY_EMBED_DIM default + commented Mac block
      - infra/liquibase/features/091-memory-embed-768.yml         # vector(N) column width (or a new embed-NNNN migration)
      - platform/memory-service/src/main/resources/application.yml # memory.dim default
      - platform/memory-service/README.md                          # dim contract + "Dim mismatch" note
      - plans/platform.md                                          # memory-service embedding-channel prose
      - platform/llm-gateway/README.md                             # embedding-model example (also in llm-model-tag)
    notes: >
      Swapping the embedding model changes the dim, the vector(N) column AND the
      LIQUIBASE_CONTEXTS that gates the widen migration. Three knobs move as one:
      LLM_EMBEDDING_MODEL ↔ MEMORY_EMBED_DIM ↔ vector(N) in the context-gated
      embed-NNN migration. The mock/dev default stays 384 (004-memory, no context);
      only the real-provider deploy overrides all three. A new dim (e.g. bge-m3 =
      1024) needs its own embed-1024 context + migration — do NOT amend 091.

  - id: new-service-or-mcp-module
    trigger: Added a new service or MCP module
    must_update:
      - infra/docker-compose*.yml
      - README.md
      - "<module>/README.md"
      - plans/architecture.md
      - plans/INDEX.md
      - "<module>/.env.example"
    revalidate:
      - golden test if the module has an LLM surface

  - id: new-env-port-endpoint-tool
    trigger: Added a new env var / port / endpoint / MCP tool
    must_update:
      - "<module>/README.md"
      - "<module>/.env.example"
      - "<consumer>/README.md (§who-uses-me)"

  - id: new-wire-contract
    trigger: Added or changed a cross-service wire contract in libs/contracts
    ssot: libs/contracts
    must_update:
      - both sides' code
      - "E2E<Stage/Feature>...Test"

  - id: skills-pointer
    trigger: Changed the reusable-skills wiring
    must_update:
      - CLAUDE.md (Reusable dev-workflow skills block)
      - .skills/change-map.yaml
    notes: The tools/agent-skills pointer + index must exist and match across docs.
