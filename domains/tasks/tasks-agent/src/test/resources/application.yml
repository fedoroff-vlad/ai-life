# Test-scope config. Mirrors src/main/resources/application.yml verbatim (Spring Boot's
# test/resources application.yml REPLACES the main one — they don't merge) plus a single
# override: spring.ai.mcp.client is disabled by default so the per-test SpringBootTest doesn't
# pay the ~20s eager-connect timeout when mcp-tasks isn't running. McpClientWiringTest
# re-enables it via @SpringBootTest properties (with initialized=false).
spring:
  application:
    name: tasks-agent
  main:
    web-application-type: reactive
  ai:
    mcp:
      client:
        enabled: false

server:
  port: ${TASKS_AGENT_PORT:8096}

agent:
  manifest-classpath: AGENT.md
  skills-classpath: classpath*:skills/tasks/*/SKILL.md
  memory-recall-k: ${TASKS_AGENT_MEMORY_RECALL_K:5}

tasks-agent:
  profile-service-url: ${PROFILE_SERVICE_URL:http://profile-service:8082}
  notifier-url: ${NOTIFIER_URL:http://notifier-service:8084}
  memory-service-url: ${MEMORY_SERVICE_URL:http://memory-service:8087}
  mcp-tasks-url: ${MCP_TASKS_URL:http://mcp-tasks:8095}
  orchestrator-url: ${ORCHESTRATOR_URL:http://orchestrator:8083}

ailife:
  llm-client:
    base-url: ${LLM_GATEWAY_URL:http://llm-gateway:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

logging:
  level:
    root: INFO
    dev.fedorov.ailife: DEBUG
