spring:
  application:
    name: creator-agent
  main:
    web-application-type: reactive
  ai:
    mcp:
      client:
        # Binds mcp-creator (its data) + the shared mcp-web so a future LLM-driven flow can pick
        # their tools. The deterministic flows call the capabilities over their HTTP /internal
        # passthroughs instead. Toggle off in dev/degraded envs.
        enabled: ${CREATOR_AGENT_MCP_CLIENT_ENABLED:true}
        toolcallback:
          enabled: true
        sse:
          connections:
            mcp-creator:
              url: ${MCP_CREATOR_URL:http://mcp-creator:8108}
            mcp-web:
              url: ${MCP_WEB_URL:http://mcp-web:8098}

server:
  port: ${CREATOR_AGENT_PORT:8109}

agent:
  manifest-classpath: AGENT.md
  skills-classpath: classpath*:skills/creator/*/SKILL.md
  memory-recall-k: ${CREATOR_AGENT_MEMORY_RECALL_K:5}

creator-agent:
  mcp-creator-url: ${MCP_CREATOR_URL:http://mcp-creator:8108}
  mcp-web-url: ${MCP_WEB_URL:http://mcp-web:8098}
  profile-service-url: ${PROFILE_SERVICE_URL:http://profile-service:8082}
  notifier-url: ${NOTIFIER_URL:http://notifier-service:8084}
  memory-service-url: ${MEMORY_SERVICE_URL:http://memory-service:8087}

ailife:
  llm-client:
    base-url: ${LLM_GATEWAY_URL:http://llm-gateway:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

logging:
  level:
    root: INFO
    dev.fedorov.ailife: DEBUG
