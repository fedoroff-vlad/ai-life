spring:
  application:
    name: mcp-caldav
  datasource:
    url: ${MCP_CALDAV_DB_URL:jdbc:postgresql://localhost:5432/ailife}
    username: ${MCP_CALDAV_DB_USER:ailife}
    password: ${MCP_CALDAV_DB_PASSWORD:ailife}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate.jdbc.time_zone: UTC
      hibernate.type.json_format_mapper: dev.fedorov.ailife.common.jackson.Jackson3JsonFormatMapper
  ai:
    mcp:
      server:
        name: ai-life-caldav
        version: 0.0.1
        type: ASYNC
        instructions: >
          Calendar operations against the household's CalDAV server (Radicale).
          Writes go through to Radicale and are mirrored in a Postgres cache that
          is the source of truth for reads.

server:
  port: ${MCP_CALDAV_PORT:8090}

caldav:
  url: ${CALDAV_URL:http://localhost:5232}
  user: ${CALDAV_USER:}
  password: ${CALDAV_PASSWORD:}
  default-calendar: ${CALDAV_DEFAULT_CALENDAR:ours}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

logging:
  level:
    root: INFO
    dev.fedorov.ailife: DEBUG
