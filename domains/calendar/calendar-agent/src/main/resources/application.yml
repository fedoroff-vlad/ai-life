spring:
  application:
    name: calendar-agent
  main:
    web-application-type: reactive

server:
  port: ${CALENDAR_AGENT_PORT:8086}

agent:
  manifest-classpath: AGENT.md
  skills-classpath: classpath*:skills/calendar/*/SKILL.md
  memory-recall-k: ${CALENDAR_AGENT_MEMORY_RECALL_K:5}

calendar-agent:
  profile-service-url: ${PROFILE_SERVICE_URL:http://profile-service:8082}
  notifier-url: ${NOTIFIER_URL:http://notifier-service:8084}
  ics-import-url: ${MCP_ICS_IMPORT_URL:http://mcp-ics-import:8091}
  memory-service-url: ${MEMORY_SERVICE_URL:http://memory-service:8087}
  mcp-caldav-url: ${MCP_CALDAV_URL:http://mcp-caldav:8090}
  orchestrator-url: ${ORCHESTRATOR_URL:http://orchestrator:8083}

ailife:
  llm-client:
    base-url: ${LLM_GATEWAY_URL:http://llm-gateway:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

logging:
  level:
    root: INFO
    dev.fedorov.ailife: DEBUG
