spring:
  application:
    name: stylist-agent
  main:
    web-application-type: reactive
  ai:
    mcp:
      client:
        # Binds mcp-wardrobe (its data) + the shared mcp-media-processing (vision) +
        # mcp-web (trends) + mcp-image-gen (illustrations) so a future LLM-driven flow
        # can pick their tools. The deterministic flows call the capabilities over their
        # HTTP /internal passthroughs instead. Toggle off in dev/degraded envs.
        enabled: ${STYLIST_AGENT_MCP_CLIENT_ENABLED:true}
        toolcallback:
          enabled: true
        sse:
          connections:
            mcp-wardrobe:
              url: ${MCP_WARDROBE_URL:http://mcp-wardrobe:8101}
            mcp-media-processing:
              url: ${MCP_MEDIA_PROCESSING_URL:http://mcp-media-processing:8097}
            mcp-web:
              url: ${MCP_WEB_URL:http://mcp-web:8098}
            mcp-image-gen:
              url: ${MCP_IMAGE_GEN_URL:http://mcp-image-gen:8103}

server:
  port: ${STYLIST_AGENT_PORT:8102}

agent:
  manifest-classpath: AGENT.md
  skills-classpath: classpath*:skills/stylist/*/SKILL.md
  memory-recall-k: ${STYLIST_AGENT_MEMORY_RECALL_K:5}

stylist-agent:
  mcp-wardrobe-url: ${MCP_WARDROBE_URL:http://mcp-wardrobe:8101}
  mcp-media-processing-url: ${MCP_MEDIA_PROCESSING_URL:http://mcp-media-processing:8097}
  mcp-web-url: ${MCP_WEB_URL:http://mcp-web:8098}
  mcp-image-gen-url: ${MCP_IMAGE_GEN_URL:http://mcp-image-gen:8103}
  media-service-url: ${MEDIA_SERVICE_URL:http://media-service:8088}
  public-media-base-url: ${STYLIST_PUBLIC_MEDIA_BASE_URL:http://media-service:8088}
  profile-service-url: ${PROFILE_SERVICE_URL:http://profile-service:8082}
  notifier-url: ${NOTIFIER_URL:http://notifier-service:8084}
  memory-service-url: ${MEMORY_SERVICE_URL:http://memory-service:8087}
  # Editorial-board theme — defaults = the locked beige/Oranienbaum aesthetic.
  # Override any value to re-skin the HTML deliverables without a code change.
  theme:
    paper: ${STYLIST_THEME_PAPER:#efe7d8}
    ink: ${STYLIST_THEME_INK:#3a352d}
    soft: ${STYLIST_THEME_SOFT:#6f675a}
    muted: ${STYLIST_THEME_MUTED:#9a907e}
    line: ${STYLIST_THEME_LINE:#d8cdb6}
    gold: ${STYLIST_THEME_GOLD:#a98a4e}
    keep: ${STYLIST_THEME_KEEP:#5a6b4f}
    question: ${STYLIST_THEME_QUESTION:#b0823a}
    remove: ${STYLIST_THEME_REMOVE:#9b4a3a}
    serif-family: '${STYLIST_THEME_SERIF_FAMILY:"Oranienbaum",Georgia,"Times New Roman",serif}'
    sans-family: '${STYLIST_THEME_SANS_FAMILY:"Manrope",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}'
    google-fonts-query: '${STYLIST_THEME_GOOGLE_FONTS_QUERY:family=Oranienbaum&family=Manrope:wght@300;400;500&display=swap}'

ailife:
  llm-client:
    base-url: ${LLM_GATEWAY_URL:http://llm-gateway:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

logging:
  level:
    root: INFO
    dev.fedorov.ailife: DEBUG
