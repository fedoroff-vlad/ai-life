spring:
  application:
    name: mcp-wardrobe
  datasource:
    url: ${MCP_WARDROBE_DB_URL:jdbc:postgresql://localhost:5432/ailife}
    username: ${MCP_WARDROBE_DB_USER:ailife}
    password: ${MCP_WARDROBE_DB_PASSWORD:ailife}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate.jdbc.time_zone: UTC
      hibernate.type.json_format_mapper: dev.fedorov.ailife.common.jackson.Jackson3JsonFormatMapper
  ai:
    mcp:
      server:
        name: ai-life-wardrobe
        version: 0.0.1
        type: ASYNC
        instructions: >
          Source-of-truth wardrobe CRUD over Postgres wardrobe.* schema. Garments
          (one row per catalogued item) and the owner's style profile (person/colour
          type, body shape, suitable fabrics, measurements). Photos live in
          media-service; rows carry the media id, not the bytes.

server:
  port: ${MCP_WARDROBE_PORT:8101}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

logging:
  level:
    root: INFO
    dev.fedorov.ailife: DEBUG
