spring:
  application:
    name: mcp-briefing
  datasource:
    url: ${MCP_BRIEFING_DB_URL:jdbc:postgresql://localhost:5432/ailife}
    username: ${MCP_BRIEFING_DB_USER:ailife}
    password: ${MCP_BRIEFING_DB_PASSWORD:ailife}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate.jdbc.time_zone: UTC

  ai:
    mcp:
      server:
        name: ai-life-briefing
        version: 0.0.1
        type: ASYNC
        instructions: >
          Source-of-truth briefing CRUD over Postgres briefing.* schema. Per-person briefing
          preferences (briefing_profile: location lat/lon + label + timezone, news interests,
          enabled sections weather|agenda|finance|news, and the morning schedule). The
          gather → synthesize digest flow lives in briefing-agent; this MCP just persists.

mcp-briefing:
  scheduler-url: ${SCHEDULER_URL:http://scheduler-service:8085}

server:
  port: ${MCP_BRIEFING_PORT:8114}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

logging:
  level:
    root: INFO
    dev.fedorov.ailife: DEBUG
