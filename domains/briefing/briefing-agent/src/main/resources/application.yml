spring:
  application:
    name: briefing-agent
  main:
    web-application-type: reactive
  ai:
    mcp:
      client:
        # Binds mcp-briefing (its data) + the shared mcp-weather / mcp-web so a future LLM-driven flow
        # can pick their tools. The deterministic flows call the capabilities over their HTTP /internal
        # passthroughs instead. Toggle off in dev/degraded envs.
        enabled: ${BRIEFING_AGENT_MCP_CLIENT_ENABLED:true}
        toolcallback:
          enabled: true
        sse:
          connections:
            mcp-briefing:
              url: ${MCP_BRIEFING_URL:http://mcp-briefing:8114}
            mcp-weather:
              url: ${MCP_WEATHER_URL:http://mcp-weather:8113}
            mcp-web:
              url: ${MCP_WEB_URL:http://mcp-web:8098}

server:
  port: ${BRIEFING_AGENT_PORT:8115}

agent:
  manifest-classpath: AGENT.md
  skills-classpath: classpath*:skills/briefing/*/SKILL.md
  memory-recall-k: ${BRIEFING_AGENT_MEMORY_RECALL_K:5}

briefing-agent:
  mcp-briefing-url: ${MCP_BRIEFING_URL:http://mcp-briefing:8114}
  mcp-weather-url: ${MCP_WEATHER_URL:http://mcp-weather:8113}
  mcp-web-url: ${MCP_WEB_URL:http://mcp-web:8098}
  mcp-caldav-url: ${MCP_CALDAV_URL:http://mcp-caldav:8090}
  mcp-finance-url: ${MCP_FINANCE_URL:http://mcp-finance:8092}
  profile-service-url: ${PROFILE_SERVICE_URL:http://profile-service:8082}
  notifier-url: ${NOTIFIER_URL:http://notifier-service:8084}
  memory-service-url: ${MEMORY_SERVICE_URL:http://memory-service:8087}

ailife:
  llm-client:
    base-url: ${LLM_GATEWAY_URL:http://llm-gateway:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

logging:
  level:
    root: INFO
    dev.fedorov.ailife: DEBUG
