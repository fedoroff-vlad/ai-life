spring:
  application:
    name: researcher-agent
  main:
    web-application-type: reactive
  ai:
    mcp:
      client:
        # Binds the shared mcp-web capability so a future LLM-driven flow can pick
        # its tools. The deterministic research flow (R-d) calls mcp-web over its
        # HTTP /internal passthroughs instead. Toggle off in dev/degraded envs.
        enabled: ${RESEARCHER_AGENT_MCP_CLIENT_ENABLED:true}
        toolcallback:
          enabled: true
        sse:
          connections:
            mcp-web:
              url: ${MCP_WEB_URL:http://mcp-web:8098}

server:
  port: ${RESEARCHER_AGENT_PORT:8099}

agent:
  manifest-classpath: AGENT.md
  skills-classpath: classpath*:skills/researcher/*/SKILL.md
  memory-recall-k: ${RESEARCHER_AGENT_MEMORY_RECALL_K:5}

researcher-agent:
  mcp-web-url: ${MCP_WEB_URL:http://mcp-web:8098}
  profile-service-url: ${PROFILE_SERVICE_URL:http://profile-service:8082}
  notifier-url: ${NOTIFIER_URL:http://notifier-service:8084}
  memory-service-url: ${MEMORY_SERVICE_URL:http://memory-service:8087}

ailife:
  llm-client:
    base-url: ${LLM_GATEWAY_URL:http://llm-gateway:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

logging:
  level:
    root: INFO
    dev.fedorov.ailife: DEBUG
