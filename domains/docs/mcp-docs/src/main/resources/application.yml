spring:
  application:
    name: mcp-docs
  datasource:
    url: ${MCP_DOCS_DB_URL:jdbc:postgresql://localhost:5432/ailife}
    username: ${MCP_DOCS_DB_USER:ailife}
    password: ${MCP_DOCS_DB_PASSWORD:ailife}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate.jdbc.time_zone: UTC

  ai:
    mcp:
      server:
        name: ai-life-docs
        version: 0.0.1
        type: ASYNC
        instructions: >
          Source-of-truth document archive over Postgres docs.* schema. Stores a document
          (media-service blob id + extracted metadata + full OCR text) and searches it by free
          text over title/party/OCR text. The OCR call and the metadata extraction live in
          docs-agent; this MCP just persists and searches.

server:
  port: ${MCP_DOCS_PORT:8116}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

logging:
  level:
    root: INFO
    dev.fedorov.ailife: DEBUG
