# Local development infrastructure only.
# Brings up Postgres (with pgvector + pg_trgm), Radicale (CalDAV), MinIO (S3-compatible),
# SearXNG, Whisper, and Grafana (zero-code finance dashboards over finance.* matviews).
# Application services (gateway, orchestrator, agents, mcp-*) live in docker-compose.yml,
# added in later PRs. Until then run apps from your IDE pointed at these ports.
#
#   docker compose -f infra/docker-compose.dev.yml up -d
#   docker compose -f infra/docker-compose.dev.yml down
#
# Apache AGE (graph extension) will be added in Stage 4 (memory service) via a custom
# Postgres image. For now only pgvector + pg_trgm are enabled — sufficient for Stage 0-3.

name: ai-life-dev

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai-life-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ailife}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ailife}
      POSTGRES_DB: ${POSTGRES_DB:-ailife}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ailife} -d ${POSTGRES_DB:-ailife}"]
      interval: 5s
      timeout: 3s
      retries: 20

  liquibase:
    image: liquibase/liquibase:4.30
    container_name: ai-life-liquibase
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      LIQUIBASE_COMMAND_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-ailife}
      LIQUIBASE_COMMAND_USERNAME: ${POSTGRES_USER:-ailife}
      LIQUIBASE_COMMAND_PASSWORD: ${POSTGRES_PASSWORD:-ailife}
      LIQUIBASE_COMMAND_CHANGELOG_FILE: db.changelog-master.xml
      LIQUIBASE_SEARCH_PATH: /liquibase/changelog
    volumes:
      - ./liquibase:/liquibase/changelog:ro
    command: ["update"]

  radicale:
    image: tomsquest/docker-radicale:latest
    container_name: ai-life-radicale
    restart: unless-stopped
    ports:
      - "${RADICALE_PORT:-5232}:5232"
    volumes:
      - radicale-data:/data
      - ./radicale/config:/etc/radicale/config:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5232/"]
      interval: 30s
      timeout: 5s
      retries: 5

  searxng:
    image: searxng/searxng:latest
    container_name: ai-life-searxng
    restart: unless-stopped
    ports:
      - "${SEARXNG_PORT:-8888}:8080"
    environment:
      SEARXNG_BASE_URL: http://localhost:${SEARXNG_PORT:-8888}/
      SEARXNG_SECRET: ${SEARXNG_SECRET:-ailife-dev-secret-change-me}
    volumes:
      - ./searxng:/etc/searxng:rw
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5

  # Whisper ASR sidecar — real STT engine for an IDE-run mcp-media-processing
  # (point WHISPER_ASR_URL at http://localhost:${WHISPER_PORT}).
  whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest
    container_name: ai-life-whisper
    restart: unless-stopped
    environment:
      ASR_ENGINE: ${WHISPER_ASR_ENGINE:-faster_whisper}
      ASR_MODEL: ${WHISPER_ASR_MODEL:-base}
    ports:
      - "${WHISPER_PORT:-9100}:9000"

  minio:
    image: minio/minio:latest
    container_name: ai-life-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-ailife}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-ailife-secret}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 5s
      retries: 5

  # Grafana — zero-code finance dashboards over the finance.* matviews (issue #196).
  # Provisioned from infra/grafana; open http://localhost:${GRAFANA_PORT:-3000}.
  grafana:
    image: grafana/grafana:11.2.0
    container_name: ai-life-grafana
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      liquibase:
        condition: service_completed_successfully
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-ailife}
      POSTGRES_USER: ${POSTGRES_USER:-ailife}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ailife}
      POSTGRES_DB: ${POSTGRES_DB:-ailife}
      GF_USERS_DEFAULT_THEME: light
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  postgres-data:
  radicale-data:
  minio-data:
  grafana-data:
