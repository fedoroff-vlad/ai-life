# Full local-deployment compose: infra + every Spring Boot service.
#
# Use this when you want the whole system up (e.g. validating end-to-end on
# Mac Studio, or smoke-testing a release). For IDE-driven development you
# usually want docker-compose.dev.yml instead — that one stops at the infra
# layer (postgres + radicale + minio + one-shot liquibase) so you can run
# the JVMs from IntelliJ pointed at host ports.
#
#   cp .env.example .env                           # edit if you want non-default ports/passwords
#   docker compose -f docker-compose.yml up -d     # all services
#   docker compose -f docker-compose.yml down      # stop
#   docker compose -f docker-compose.yml down -v   # nuke volumes too
#
# Build contexts assume repo root — every Dockerfile copies pom.xml + libs/
# from there, so the compose runs from infra/ but the build context is `..`.
#
# Healthchecks: every Spring Boot app exposes /actuator/health (configured
# in its application.yml). depends_on uses condition: service_healthy so
# downstream services don't start until their dependency is reachable.
# Liquibase runs once and exits 0 — depends_on for app services uses
# condition: service_completed_successfully on that one.
#
# Inter-service URLs are pinned to docker network service names (e.g.
# http://llm-gateway:8081); the matching env vars in .env.example carry
# localhost defaults that suit IDE-driven dev — compose overrides those
# here so the same .env works in both modes.

name: ai-life

services:
  # ---------- infrastructure ----------

  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai-life-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ailife}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ailife}
      POSTGRES_DB: ${POSTGRES_DB:-ailife}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ailife} -d ${POSTGRES_DB:-ailife}"]
      interval: 5s
      timeout: 3s
      retries: 20

  liquibase:
    image: liquibase/liquibase:4.30
    container_name: ai-life-liquibase
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      LIQUIBASE_COMMAND_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-ailife}
      LIQUIBASE_COMMAND_USERNAME: ${POSTGRES_USER:-ailife}
      LIQUIBASE_COMMAND_PASSWORD: ${POSTGRES_PASSWORD:-ailife}
      LIQUIBASE_COMMAND_CHANGELOG_FILE: db.changelog-master.xml
      LIQUIBASE_SEARCH_PATH: /liquibase/changelog
    volumes:
      - ./liquibase:/liquibase/changelog:ro
    command: ["update"]

  radicale:
    image: tomsquest/docker-radicale:latest
    container_name: ai-life-radicale
    restart: unless-stopped
    ports:
      - "${RADICALE_PORT:-5232}:5232"
    volumes:
      - radicale-data:/data
      - ./radicale/config:/etc/radicale/config:ro
    healthcheck:
      # Radicale's image has no bash so the default port-listening check
      # no-ops; hit the web root explicitly.
      test: ["CMD", "curl", "-fsS", "http://localhost:5232/"]
      interval: 30s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: ai-life-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-ailife}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-ailife-secret}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 5s
      retries: 5

  searxng:
    image: searxng/searxng:latest
    container_name: ai-life-searxng
    restart: unless-stopped
    ports:
      - "${SEARXNG_PORT:-8888}:8080"
    environment:
      SEARXNG_BASE_URL: http://localhost:${SEARXNG_PORT:-8888}/
      SEARXNG_SECRET: ${SEARXNG_SECRET:-ailife-dev-secret-change-me}
    volumes:
      - ./searxng:/etc/searxng:rw
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5

  # Whisper ASR sidecar — the real STT engine behind mcp-media-processing's `transcribe`
  # (engine decision LOCKED = sidecar service, polyglot-by-design). Self-hosted OSS, free.
  whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest
    container_name: ai-life-whisper
    restart: unless-stopped
    environment:
      ASR_ENGINE: ${WHISPER_ASR_ENGINE:-faster_whisper}
      ASR_MODEL: ${WHISPER_ASR_MODEL:-base}
    ports:
      - "${WHISPER_PORT:-9100}:9000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9000/docs')"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 120s

  # ---------- platform services ----------

  llm-gateway:
    image: ai-life/llm-gateway:local
    container_name: ai-life-llm-gateway
    build:
      context: ..
      dockerfile: platform/llm-gateway/Dockerfile
    restart: unless-stopped
    environment:
      LLM_GATEWAY_PORT: 8081
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      LLM_DEFAULT_MODEL: ${LLM_DEFAULT_MODEL:-mock-large}
      LLM_FAST_MODEL: ${LLM_FAST_MODEL:-mock-fast}
      LLM_VISION_MODEL: ${LLM_VISION_MODEL:-mock-vision}
      LLM_EMBEDDING_PROVIDER: ${LLM_EMBEDDING_PROVIDER:-mock}
      LLM_EMBEDDING_MODEL: ${LLM_EMBEDDING_MODEL:-mock-embed}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_ANTHROPIC_VERSION: ${LLM_ANTHROPIC_VERSION:-}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-4096}
    ports:
      - "${LLM_GATEWAY_PORT:-8081}:8081"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s

  profile-service:
    image: ai-life/profile-service:local
    container_name: ai-life-profile-service
    build:
      context: ..
      dockerfile: platform/profile-service/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      liquibase:
        condition: service_completed_successfully
    environment:
      PROFILE_SERVICE_PORT: 8082
      PROFILE_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-ailife}
      PROFILE_DB_USER: ${POSTGRES_USER:-ailife}
      PROFILE_DB_PASSWORD: ${POSTGRES_PASSWORD:-ailife}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s

  memory-service:
    image: ai-life/memory-service:local
    container_name: ai-life-memory-service
    build:
      context: ..
      dockerfile: platform/memory-service/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      liquibase:
        condition: service_completed_successfully
      llm-gateway:
        condition: service_healthy
      profile-service:
        condition: service_healthy
    environment:
      MEMORY_PORT: 8087
      MEMORY_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-ailife}
      MEMORY_DB_USER: ${POSTGRES_USER:-ailife}
      MEMORY_DB_PASSWORD: ${POSTGRES_PASSWORD:-ailife}
      LLM_GATEWAY_URL: http://llm-gateway:8081
      PROFILE_SERVICE_URL: http://profile-service:8082
      MEMORY_DEFAULT_K: ${MEMORY_DEFAULT_K:-5}
      MEMORY_MAX_K: ${MEMORY_MAX_K:-50}
      MEMORY_EMBED_DIM: ${MEMORY_EMBED_DIM:-384}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8087/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s

  media-service:
    image: ai-life/media-service:local
    container_name: ai-life-media-service
    build:
      context: ..
      dockerfile: platform/media-service/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      liquibase:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
    environment:
      MEDIA_PORT: 8088
      MEDIA_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-ailife}
      MEDIA_DB_USER: ${POSTGRES_USER:-ailife}
      MEDIA_DB_PASSWORD: ${POSTGRES_PASSWORD:-ailife}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-ailife}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-ailife-secret}
      MEDIA_BUCKET: ${MEDIA_BUCKET:-ai-life-media}
      MEDIA_MAX_BYTES: ${MEDIA_MAX_BYTES:-10485760}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8088/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s

  conversation-service:
    image: ai-life/conversation-service:local
    container_name: ai-life-conversation-service
    build:
      context: ..
      dockerfile: platform/conversation-service/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      liquibase:
        condition: service_completed_successfully
    environment:
      CONVERSATION_PORT: 8089
      CONVERSATION_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-ailife}
      CONVERSATION_DB_USER: ${POSTGRES_USER:-ailife}
      CONVERSATION_DB_PASSWORD: ${POSTGRES_PASSWORD:-ailife}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8089/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s

  scheduler-service:
    image: ai-life/scheduler-service:local
    container_name: ai-life-scheduler-service
    build:
      context: ..
      dockerfile: platform/scheduler-service/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      liquibase:
        condition: service_completed_successfully
    environment:
      SCHEDULER_PORT: 8085
      SCHEDULER_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-ailife}
      SCHEDULER_DB_USER: ${POSTGRES_USER:-ailife}
      SCHEDULER_DB_PASSWORD: ${POSTGRES_PASSWORD:-ailife}
      SCHEDULER_TICK_MILLIS: ${SCHEDULER_TICK_MILLIS:-30000}
      SCHEDULER_BATCH_SIZE: ${SCHEDULER_BATCH_SIZE:-50}
      ORCHESTRATOR_URL: http://orchestrator:8083
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8085/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s

  notifier-service:
    image: ai-life/notifier-service:local
    container_name: ai-life-notifier-service
    build:
      context: ..
      dockerfile: platform/notifier-service/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      liquibase:
        condition: service_completed_successfully
    environment:
      NOTIFIER_PORT: 8084
      NOTIFIER_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-ailife}
      NOTIFIER_DB_USER: ${POSTGRES_USER:-ailife}
      NOTIFIER_DB_PASSWORD: ${POSTGRES_PASSWORD:-ailife}
      PROFILE_SERVICE_URL: http://profile-service:8082
      GATEWAY_TELEGRAM_URL: http://gateway-telegram:8080
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-}
      EVENT_BUS_CHANNEL: ${EVENT_BUS_CHANNEL:-ailife_events}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8084/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s

  orchestrator:
    image: ai-life/orchestrator:local
    container_name: ai-life-orchestrator
    build:
      context: ..
      dockerfile: platform/orchestrator/Dockerfile
    restart: unless-stopped
    depends_on:
      llm-gateway:
        condition: service_healthy
      profile-service:
        condition: service_healthy
    environment:
      ORCHESTRATOR_PORT: 8083
      LLM_GATEWAY_URL: http://llm-gateway:8081
      PROFILE_SERVICE_URL: http://profile-service:8082
      MEMORY_SERVICE_URL: http://memory-service:8087
      CONVERSATION_SERVICE_URL: http://conversation-service:8089
      CALENDAR_AGENT_URL: http://calendar-agent:8086
      FINANCE_AGENT_URL: http://finance-agent:8093
      TASKS_AGENT_URL: http://tasks-agent:8096
      RESEARCHER_AGENT_URL: http://researcher-agent:8099
      STYLIST_AGENT_URL: http://stylist-agent:8102
      ORCHESTRATOR_CATCH_ALL_AGENT: ${ORCHESTRATOR_CATCH_ALL_AGENT:-tasks}
      ORCHESTRATOR_MEMORY_ENABLED: ${ORCHESTRATOR_MEMORY_ENABLED:-true}
      ORCHESTRATOR_MEMORY_RECALL_K: ${ORCHESTRATOR_MEMORY_RECALL_K:-3}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8083/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s

  gateway-telegram:
    image: ai-life/gateway-telegram:local
    container_name: ai-life-gateway-telegram
    build:
      context: ..
      dockerfile: platform/gateway-telegram/Dockerfile
    restart: unless-stopped
    depends_on:
      profile-service:
        condition: service_healthy
      orchestrator:
        condition: service_healthy
      media-service:
        condition: service_healthy
    environment:
      GATEWAY_PORT: 8080
      GATEWAY_TELEGRAM_BOT_USERNAME: ${GATEWAY_TELEGRAM_BOT_USERNAME:-ai_life_bot}
      GATEWAY_TELEGRAM_BOT_TOKEN: ${GATEWAY_TELEGRAM_BOT_TOKEN:-}
      GATEWAY_DEFAULT_HOUSEHOLD_NAME: ${GATEWAY_DEFAULT_HOUSEHOLD_NAME:-default household}
      GATEWAY_INTERNAL_API_TOKEN: ${GATEWAY_INTERNAL_API_TOKEN:-}
      PROFILE_SERVICE_URL: http://profile-service:8082
      ORCHESTRATOR_URL: http://orchestrator:8083
      MEDIA_SERVICE_URL: http://media-service:8088
    ports:
      # Only the gateway needs to be reachable from outside the compose
      # network — Telegram webhooks hit it. Everything else is internal.
      - "${GATEWAY_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s

  # ---------- MCP servers ----------

  mcp-caldav:
    image: ai-life/mcp-caldav:local
    container_name: ai-life-mcp-caldav
    build:
      context: ..
      dockerfile: domains/calendar/mcp-caldav/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      liquibase:
        condition: service_completed_successfully
      radicale:
        condition: service_healthy
    environment:
      MCP_CALDAV_PORT: 8090
      MCP_CALDAV_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-ailife}
      MCP_CALDAV_DB_USER: ${POSTGRES_USER:-ailife}
      MCP_CALDAV_DB_PASSWORD: ${POSTGRES_PASSWORD:-ailife}
      CALDAV_URL: http://radicale:5232
      CALDAV_USER: ${CALDAV_USER:-}
      CALDAV_PASSWORD: ${CALDAV_PASSWORD:-}
      CALDAV_DEFAULT_CALENDAR: ${CALDAV_DEFAULT_CALENDAR:-ours}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8090/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s

  mcp-ics-import:
    image: ai-life/mcp-ics-import:local
    container_name: ai-life-mcp-ics-import
    build:
      context: ..
      dockerfile: domains/calendar/mcp-ics-import/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      liquibase:
        condition: service_completed_successfully
      radicale:
        condition: service_healthy
      scheduler-service:
        condition: service_healthy
    environment:
      MCP_ICS_IMPORT_PORT: 8091
      MCP_ICS_IMPORT_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-ailife}
      MCP_ICS_IMPORT_DB_USER: ${POSTGRES_USER:-ailife}
      MCP_ICS_IMPORT_DB_PASSWORD: ${POSTGRES_PASSWORD:-ailife}
      CALDAV_URL: http://radicale:5232
      CALDAV_USER: ${CALDAV_USER:-}
      CALDAV_PASSWORD: ${CALDAV_PASSWORD:-}
      ICS_IMPORT_COLLECTION_PREFIX: ${ICS_IMPORT_COLLECTION_PREFIX:-external}
      ICS_IMPORT_MAX_BYTES: ${ICS_IMPORT_MAX_BYTES:-5242880}
      ICSIMPORT_SCHEDULER_URL: http://scheduler-service:8085
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8091/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s

  mcp-finance:
    image: ai-life/mcp-finance:local
    container_name: ai-life-mcp-finance
    build:
      context: ..
      dockerfile: domains/finance/mcp-finance/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      liquibase:
        condition: service_completed_successfully
      scheduler-service:
        condition: service_healthy
    environment:
      MCP_FINANCE_PORT: 8092
      MCP_FINANCE_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-ailife}
      MCP_FINANCE_DB_USER: ${POSTGRES_USER:-ailife}
      MCP_FINANCE_DB_PASSWORD: ${POSTGRES_PASSWORD:-ailife}
      SCHEDULER_URL: http://scheduler-service:8085
      MCP_FINANCE_BUDGET_CRON: ${MCP_FINANCE_BUDGET_CRON:-0 0 9 * * *}
      MCP_FINANCE_BUDGET_OWNER_AGENT: ${MCP_FINANCE_BUDGET_OWNER_AGENT:-finance}
      MCP_FINANCE_BUDGET_TRIGGER_KIND: ${MCP_FINANCE_BUDGET_TRIGGER_KIND:-budget.alert}
      MCP_FINANCE_RECURRING_OWNER_AGENT: ${MCP_FINANCE_RECURRING_OWNER_AGENT:-finance}
      MCP_FINANCE_RECURRING_TRIGGER_KIND: ${MCP_FINANCE_RECURRING_TRIGGER_KIND:-recurring.due}
      MCP_FINANCE_TRANSACTION_OWNER_AGENT: ${MCP_FINANCE_TRANSACTION_OWNER_AGENT:-finance}
      MCP_FINANCE_TRANSACTION_TRIGGER_KIND: ${MCP_FINANCE_TRANSACTION_TRIGGER_KIND:-transaction.uncategorised}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8092/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s

  mcp-media-processing:
    image: ai-life/mcp-media-processing:local
    container_name: ai-life-mcp-media-processing
    build:
      context: ..
      dockerfile: shared/mcp/mcp-media-processing/Dockerfile
    restart: unless-stopped
    depends_on:
      media-service:
        condition: service_healthy
      llm-gateway:
        condition: service_healthy
      # Not service_healthy: whisper pulls its model on first boot (slow), but ocr/caption
      # must work regardless — transcribe is lazy + best-effort, so don't block on it.
      whisper:
        condition: service_started
    environment:
      MCP_MEDIA_PROCESSING_PORT: 8097
      MEDIA_SERVICE_URL: http://media-service:8088
      LLM_GATEWAY_URL: http://llm-gateway:8081
      MCP_MEDIA_PROCESSING_STT_ENGINE: whisper
      WHISPER_ASR_URL: http://whisper:9000
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8097/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s

  mcp-web:
    image: ai-life/mcp-web:local
    container_name: ai-life-mcp-web
    build:
      context: ..
      dockerfile: shared/mcp/mcp-web/Dockerfile
    restart: unless-stopped
    depends_on:
      searxng:
        condition: service_healthy
    environment:
      MCP_WEB_PORT: 8098
      SEARXNG_URL: http://searxng:8080
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8098/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s

  mcp-market-data:
    image: ai-life/mcp-market-data:local
    container_name: ai-life-mcp-market-data
    build:
      context: ..
      dockerfile: shared/mcp/mcp-market-data/Dockerfile
    restart: unless-stopped
    # No backing container — quotes come from Stooq over public HTTPS.
    environment:
      MCP_MARKET_DATA_PORT: 8100
      MARKETDATA_STOOQ_URL: https://stooq.com
      MARKETDATA_SOURCE: stooq
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8100/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s

  mcp-money-pro-import:
    image: ai-life/mcp-money-pro-import:local
    container_name: ai-life-mcp-money-pro-import
    build:
      context: ..
      dockerfile: domains/finance/mcp-money-pro-import/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      liquibase:
        condition: service_completed_successfully
    environment:
      MCP_MONEY_PRO_IMPORT_PORT: 8094
      MCP_MONEY_PRO_IMPORT_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-ailife}
      MCP_MONEY_PRO_IMPORT_DB_USER: ${POSTGRES_USER:-ailife}
      MCP_MONEY_PRO_IMPORT_DB_PASSWORD: ${POSTGRES_PASSWORD:-ailife}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8094/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s

  mcp-tasks:
    image: ai-life/mcp-tasks:local
    container_name: ai-life-mcp-tasks
    build:
      context: ..
      dockerfile: domains/tasks/mcp-tasks/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      liquibase:
        condition: service_completed_successfully
      scheduler-service:
        condition: service_healthy
    environment:
      MCP_TASKS_PORT: 8095
      MCP_TASKS_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-ailife}
      MCP_TASKS_DB_USER: ${POSTGRES_USER:-ailife}
      MCP_TASKS_DB_PASSWORD: ${POSTGRES_PASSWORD:-ailife}
      SCHEDULER_URL: http://scheduler-service:8085
      MCP_TASKS_REVIEW_CRON: ${MCP_TASKS_REVIEW_CRON:-0 0 9 * * MON}
      MCP_TASKS_REVIEW_OWNER_AGENT: ${MCP_TASKS_REVIEW_OWNER_AGENT:-tasks}
