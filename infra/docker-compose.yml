  calendar-web:
    profiles: ["tunnel"]
    image: ai-life/calendar-web:local
    container_name: ai-life-calendar-web
    build:
      context: ..
      dockerfile: platform/calendar-web/Dockerfile
    restart: unless-stopped
    depends_on:
      mcp-caldav:
        condition: service_healthy
    environment:
