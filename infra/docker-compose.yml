      CALENDAR_WEB_PAST_DAYS: ${CALENDAR_WEB_PAST_DAYS:-31}
      CALENDAR_WEB_FUTURE_DAYS: ${CALENDAR_WEB_FUTURE_DAYS:-366}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8113/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s

  # Public HTTPS for calendar-web via Tailscale Funnel (#195). Off by default — enabled with the
  # "tunnel" profile once TS_AUTHKEY is set (one-time): `docker compose --profile tunnel up`.
  # The feed URL is then https://ai-life-calendar.<your-tailnet>.ts.net/ics/<token>.ics
  tailscale-calendar:
    image: tailscale/tailscale:latest
    container_name: ai-life-tailscale-calendar
    hostname: ai-life-calendar
    restart: unless-stopped
    profiles: ["tunnel"]
    depends_on:
      calendar-web:
        condition: service_healthy
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY:-}
      TS_STATE_DIR: /var/lib/tailscale
      TS_SERVE_CONFIG: /config/serve.json
      TS_EXTRA_ARGS: --reset
    volumes:
      - tailscale-calendar-state:/var/lib/tailscale
      - ./tailscale/calendar-serve.json:/config/serve.json:ro
    cap_add:
      - net_admin
      - sys_module

volumes:
  postgres-data:
  radicale-data:
  minio-data:
  grafana-data:
  tailscale-calendar-state:
