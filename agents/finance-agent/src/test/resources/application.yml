# Test-scope application config. Mirrors src/main/resources/application.yml
# verbatim (Spring Boot's test/resources application.yml REPLACES the main
# one — they don't merge) plus a single override: spring.ai.mcp.client is
# disabled by default so the per-test SpringBootTest doesn't pay the 20s
# eager-connect timeout when mcp-money-pro-import isn't running. The
# dedicated McpClientWiringTest re-enables it via @SpringBootTest properties.
spring:
  application:
    name: finance-agent
  main:
    web-application-type: reactive
  ai:
    mcp:
      client:
        enabled: false

server:
  port: ${FINANCE_AGENT_PORT:8093}

agent:
  manifest-classpath: AGENT.md
  skills-classpath: classpath*:skills/finance/*/SKILL.md
  memory-recall-k: ${FINANCE_AGENT_MEMORY_RECALL_K:5}

finance-agent:
  profile-service-url: ${PROFILE_SERVICE_URL:http://profile-service:8082}
  notifier-url: ${NOTIFIER_URL:http://notifier-service:8084}
  memory-service-url: ${MEMORY_SERVICE_URL:http://memory-service:8087}
  mcp-finance-url: ${MCP_FINANCE_URL:http://mcp-finance:8092}
  media-service-url: ${MEDIA_SERVICE_URL:http://media-service:8088}
  mcp-money-pro-import-url: ${MCP_MONEY_PRO_IMPORT_URL:http://mcp-money-pro-import:8094}

ailife:
  llm-client:
    base-url: ${LLM_GATEWAY_URL:http://llm-gateway:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

logging:
  level:
    root: INFO
    dev.fedorov.ailife: DEBUG
