spring:
  application:
    name: finance-agent
  main:
    web-application-type: reactive
  ai:
    mcp:
      client:
        # Each connection is dialled lazily on first tool invocation, so
        # finance-agent boots even if a downstream MCP server is offline —
        # but a fully missing block disables auto-config entirely. Toggle
        # via FINANCE_AGENT_MCP_CLIENT_ENABLED if you need to silence the
        # client in tests or a degraded environment.
        enabled: ${FINANCE_AGENT_MCP_CLIENT_ENABLED:true}
        # Tool name prefixing keeps mcp-money-pro-import.import_moneypro_csv
        # distinct from any future like-named tool from another server
        # (e.g. a hypothetical mcp-finance.import_*).
        toolcallback:
          enabled: true
        sse:
          connections:
            # Server identifier used as the tool-name prefix when prefixing
            # is enabled (see toolcallback above). Future MCP servers add
            # another entry below; mcp-finance stays on its HTTP /internal
            # passthroughs until an agent-side @Tool call shape needs it.
            mcp-money-pro-import:
              url: ${MCP_MONEY_PRO_IMPORT_URL:http://mcp-money-pro-import:8094}

server:
  port: ${FINANCE_AGENT_PORT:8093}

agent:
  manifest-classpath: AGENT.md
  skills-classpath: classpath*:skills/finance/*/SKILL.md
  memory-recall-k: ${FINANCE_AGENT_MEMORY_RECALL_K:5}

finance-agent:
  profile-service-url: ${PROFILE_SERVICE_URL:http://profile-service:8082}
  notifier-url: ${NOTIFIER_URL:http://notifier-service:8084}
  memory-service-url: ${MEMORY_SERVICE_URL:http://memory-service:8087}
  mcp-finance-url: ${MCP_FINANCE_URL:http://mcp-finance:8092}
  media-service-url: ${MEDIA_SERVICE_URL:http://media-service:8088}
  mcp-money-pro-import-url: ${MCP_MONEY_PRO_IMPORT_URL:http://mcp-money-pro-import:8094}

ailife:
  llm-client:
    base-url: ${LLM_GATEWAY_URL:http://llm-gateway:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

logging:
  level:
    root: INFO
    dev.fedorov.ailife: DEBUG
