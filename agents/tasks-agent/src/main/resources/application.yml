spring:
  application:
    name: tasks-agent
  main:
    web-application-type: reactive
  ai:
    mcp:
      client:
        # Dialled at context refresh (per-server request-timeout, default 20s),
        # so a missing mcp-tasks surfaces at agent boot — opinionated fail-fast,
        # consistent with finance-agent (PR33). Toggle via TASKS_AGENT_MCP_CLIENT_ENABLED.
        enabled: ${TASKS_AGENT_MCP_CLIENT_ENABLED:true}
        toolcallback:
          enabled: true
        sse:
          connections:
            mcp-tasks:
              url: ${MCP_TASKS_URL:http://mcp-tasks:8095}

server:
  port: ${TASKS_AGENT_PORT:8096}

agent:
  manifest-classpath: AGENT.md
  skills-classpath: classpath*:skills/tasks/*/SKILL.md
  memory-recall-k: ${TASKS_AGENT_MEMORY_RECALL_K:5}

# Outbound destinations: profile/notifier/memory back AgentRuntimeConfig's shared clients;
# mcp-tasks-url is the REST passthrough (/internal/review) the weekly-review trigger reads.
tasks-agent:
  profile-service-url: ${PROFILE_SERVICE_URL:http://profile-service:8082}
  notifier-url: ${NOTIFIER_URL:http://notifier-service:8084}
  memory-service-url: ${MEMORY_SERVICE_URL:http://memory-service:8087}
  mcp-tasks-url: ${MCP_TASKS_URL:http://mcp-tasks:8095}
  # Orchestrator sync hub for inter-agent calls (task-to-event → calendar create_event).
  orchestrator-url: ${ORCHESTRATOR_URL:http://orchestrator:8083}

ailife:
  llm-client:
    base-url: ${LLM_GATEWAY_URL:http://llm-gateway:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

logging:
  level:
    root: INFO
    dev.fedorov.ailife: DEBUG
